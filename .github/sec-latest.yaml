      (e.g., S/MIME processing or CMS-based protocols) are vulnerable.

      The FIPS modules in 3.6, 3.5, 3.4, 3.3 and 3.0 are not affected by this
      issue, as the affected code is outside the OpenSSL FIPS module boundary.
